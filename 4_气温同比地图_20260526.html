    .then(function(j) {
      echarts.registerMap("china", j);
      window.c25 = echarts.init(document.getElementById("map2025"));
      window.c26 = echarts.init(document.getElementById("map2026"));
      setupSlider(); bindEvents(); updateMaps();
    });
}
function buildOpt(yr, data, mk, day) {
  var sv = (yr === 2025);
  return {
    title: { text: yr+"年4月"+day+"日", left:"center", top:12, textStyle:{ fontSize:16, fontWeight:"bold", color:"#0f172a" } },
    tooltip: { trigger:"item", formatter: function(p){ return p.value!=null ? p.name+"<br/>"+LABELS[mk]+": "+p.value+" ℃" : p.name+"<br/>暂无数据"; } },
    visualMap: { min:R_MIN, max:R_MAX, left: sv?16:-9999, bottom: sv?"center":-9999, inRange:{ color:COLOR_RANGE }, text:["高温","低温"], textStyle:{ color:"#334155" }, calculable:false },
    series: [{ name:LABELS[mk], type:"map", map:"china", roam:false, data:data, emphasis:{ label:{ show:true, fontSize:12 }, itemStyle:{ areaColor:"#fbbf24" } }, itemStyle:{ borderColor:"#fff", borderWidth:0.8 }, label:{ show:false } }]
  };
}
function updateMaps() {
  var d = DAYS[curDayIdx], dd = ALL_DATA[curMetric][String(d)] || {};
  c25.setOption(buildOpt(2025, dd["2025"]||[], curMetric, d), true);
  c26.setOption(buildOpt(2026, dd["2026"]||[], curMetric, d), true);
  document.getElementById("dayLabel").textContent = "4月"+d+"日";
  document.getElementById("daySlider").value = curDayIdx;
}
function setupSlider() {
  var s = document.getElementById("daySlider"); s.min=0; s.max=DAYS.length-1; s.value=0;
  var t = document.getElementById("tickLabels"); t.innerHTML="";
  for(var i=0;i<DAYS.length;i++) { var sp=document.createElement("span"); sp.textContent=(i%5===0||i===DAYS.length-1)?DAYS[i]:""; sp.style.flex="1"; sp.style.textAlign="center"; t.appendChild(sp); }
}
function bindEvents() {
  document.querySelectorAll(".tab-btn").forEach(function(b){ b.addEventListener("click",function(){ document.querySelectorAll(".tab-btn").forEach(function(x){ x.classList.remove("active"); }); this.classList.add("active"); curMetric=this.dataset.key; updateMaps(); }); });
  document.getElementById("daySlider").addEventListener("input",function(){ curDayIdx=parseInt(this.value); updateMaps(); });
  document.getElementById("playBtn").addEventListener("click",function(){
    if(playing){ clearInterval(timer); this.textContent="▶"; this.classList.remove("playing"); }
    else{ this.textContent="⏸"; this.classList.add("playing"); timer=setInterval(function(){ curDayIdx++; if(curDayIdx>=DAYS.length)curDayIdx=0; updateMaps(); },1200); }
    playing=!playing;
  });
  window.addEventListener("resize",function(){ c25.resize(); c26.resize(); });
}
init();
</script>
</body>
</html>
